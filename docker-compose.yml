version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: amaima_db
    environment:
      POSTGRES_USER: amaima_user
      POSTGRES_PASSWORD: sua_senha_aqui
      POSTGRES_DB: amaima_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/database.sql:/docker-entrypoint-initdb.d/database.sql
    ports:
      - "5432:5432"
    networks:
      - amaima_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amaima_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  amaima_network:
    driver: bridge
